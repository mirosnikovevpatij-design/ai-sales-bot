# Автодеплой на сервер при пуше в main.
# Включить: GitHub → Settings → Secrets and variables → Actions:
#   SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY
name: Deploy to server
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/ai-sales-bot
            chmod +x deploy.sh
            ./deploy.sh
